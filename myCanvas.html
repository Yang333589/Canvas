<!DOCTYPE html>
<html lang="en">
<head>
    <title>Canvas</title>
    <script src="script.js" defer></script>
</head>
<body>
    <canvas id = "canvas" width="300" height="300" style = "border:2px solid black">

    </canvas>
    <div>
        <button id="clear">Clear</button>
        <label for="opacity">
            <input type="range" min="0" max="1" value="1" step="0.1" id="opacity">
            Opacity
        </label>
        <label for="color">
            <input type="color" id="color">
            Color
        </label>
    </div>
</body>
</html>
